info:
  name: Me
  type: http
  seq: 5

http:
  method: GET
  url: "{{baseUrl}}/auth/me"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Returns the authenticated user. Requires `accessToken` cookie (JWT from **Login** / **Register**).
  Run Login first so Bruno keeps cookies for localhost, or paste the cookie manually.
