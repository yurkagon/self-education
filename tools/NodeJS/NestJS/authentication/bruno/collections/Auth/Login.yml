info:
  name: Login
  type: http
  seq: 2

http:
  method: POST
  url: "{{baseUrl}}/auth/login"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "email": "ada@example.com",
        "password": "12345678"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
