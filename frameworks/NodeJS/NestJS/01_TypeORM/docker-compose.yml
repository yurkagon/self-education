# Версія формату docker-compose файлу (визначає синтаксис і можливості)
version: '3.9'

# Секція сервісів - тут описуються контейнери, які будуть запущені
services:
  # Назва сервісу (контейнера) - використовується для звернення до сервісу
  postgres:
    # Ім'я контейнера (якщо не вказано, Docker згенерує ім'я автоматично)
    container_name: postgres
    # Образ Docker для використання (postgres версії 18)
    image: postgres:18
    # Політика перезапуску: always = автоматично перезапускати контейнер після падіння або перезавантаження хоста
    restart: always
    # Секція змінних оточення для контейнера
    environment:
      # Ім'я користувача бази даних PostgreSQL
      POSTGRES_USER: ${POSTGRES_USER}
      # Пароль користувача бази даних PostgreSQL
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      # Назва бази даних PostgreSQL (створюється автоматично при першому запуску)
      POSTGRES_DB: ${POSTGRES_DB_NAME}
    # Секція маппінгу портів між хостом і контейнером
    ports:
      # Маппінг портів у форматі "хост:контейнер" (порт 5432 на хості -> порт 5432 у контейнері)
      - 5432:5432
    # Секція томів для збереження даних між запусками контейнера
    volumes:
      # Для PostgreSQL 18+ потрібно монтувати /var/lib/postgresql (не /data), щоб PostgreSQL міг створити правильну структуру директорій
      - postgres_data:/var/lib/postgresql
    # Секція мереж, до яких підключений контейнер
    networks:
      # Контейнер підключається до мережі nestjs_course_network
      - nestjs_course_network

# Тут ми створюмо ТОМ та Мережу (зверху ми лише вказали, що будемо їх використовувати)
volumes:
  # Назва тому postgres_data - дані зберігаються навіть після видалення контейнера
  postgres_data:

networks:
  # Визначення мережі nestjs_course_network
  nestjs_course_network:
