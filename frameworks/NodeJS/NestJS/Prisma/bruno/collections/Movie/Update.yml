info:
  name: Update
  type: http
  seq: 5

http:
  method: PATCH
  url: http://localhost:3000/movie/:id
  headers:
    - name: Authorization
      value: Bearer token
    - name: Content-Type
      value: application/json
  params:
    - name: id
      value: 00000000-0000-0000-0000-000000000000
      type: path
  body:
    type: json
    data: |-
      {
        "title": "Inception (Director's Cut)",
        "description": "Updated description.",
        "releaseYear": 2010,
        "isPublished": false,
        "url": "https://example.com/posters/inception-dc.jpg"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
