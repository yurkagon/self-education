info:
  name: Create (no poster)
  type: http
  seq: 4

http:
  method: POST
  url: http://localhost:3000/movie
  headers:
    - name: Authorization
      value: Bearer token
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "title": "Banditskiy kuznetsovsk",
        "description": "A thief who steals corporate secrets through dream-sharing technology.",
        "isPublished": true,
        "releaseYear": 1996
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
